<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <link rel="shortcut icon" href="public/icon.png" type="image/x-icon">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f4f4f4;
            color: #333;
            font-family: Arial, sans-serif;
            position: relative; /* Ensure relative positioning for z-index to work */
        }

        .container {
            text-align: center;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2em;
        }

        video {
            width: 100%;
            height: 100%;
            position: fixed;
            top: 0;
            left: 0;
            object-fit: cover;
            z-index: -1;
        }

        img {
            position: absolute; /* Ensure absolute positioning for z-index to work */
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1; /* Set a higher z-index to bring the poster to the foreground */
        }
    </style>
</head>
<body>
    <video autoplay loop muted>
        <source src="https://r2.e-z.host/8a13052f-8c12-4034-b99f-0155cc616583/44n43vc7.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
    <div class="container">
        <img src="https://r2.e-z.host/8a13052f-8c12-4034-b99f-0155cc616583/9e138gir.png" alt="Poster Image">
        <h1>404 Not Found</h1>
        <p>Sorry, the page you are looking for might be in another universe.</p>
    </div>
</body>
</html>
